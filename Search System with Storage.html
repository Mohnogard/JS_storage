<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>User Directory</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            font-size: x-large;
            font-family: open sans;
            font-weight: 590;
            color: rgb(82, 82, 82);
        }

        .container {
            width: 700px;
            margin: 40px auto;
            font-family: Arial;
            box-shadow: 1px 1px 10px rgba(141, 141, 141, 0.516);
            padding: 10px 20px;
            border-radius: 20px;

        }

        .search-box {
            display: flex;
            margin-bottom: 15px;
            border: 1px black solid;
            border-radius: 10px;
            background-color: rgb(217, 217, 227);
            overflow: hidden;
            place-items: center;
            max-height: 60px;
        }

        #search {
            flex: 1;
            padding: 15px;
            border: none;
            background-color: inherit;
            font-size: x-large;
        }

        #clearbtn {
            padding: 81px 12px;
            cursor: pointer;
            border: none;
            color: white;
            font-size: x-large;
            font-weight: 590px;
            background-color: rgb(62, 126, 255);
            box-shadow: inset 1px 1px 10px rgba(141, 141, 141, 0.516);

        }

        .user {
            display: flex;
            justify-content: space-between;
            place-items: center;
            padding: 8px;
            border-bottom: 1px solid #ddd;
        }

        button.delete {
            background: red;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            font-size: inherit;
            box-shadow: inset 1px 1px 10px rgba(141, 141, 141, 0.516);
            border-radius: 5px;
        }

        .left {
            display: flex;
            place-items: center;
            box-shadow: inset;
        }
    </style>

<body>
    <div class="container">
        <h2 style="text-align: center;border-bottom: 1px solid #ddd;padding-bottom: 10px;">🔍 User Search</h2>
        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass" style="margin-left: 10px; font-size: xx-large;"></i>
            <input type="text" id="search" placeholder="Search users..." />
            <button id="clearbtn">Clear</button>
        </div>

        <div style="border-bottom: 1px solid #ddd;margin: 5px 0px; padding: 20px 0px 10px 0px;">Results:</div>

        <div id="list" style="margin-bottom: 80px;"></div>
    </div>

    <script>
        const search = document.getElementById("search");
        const list = document.getElementById("list");
        const clearbtn = document.getElementById("clearbtn");
        const restore = document.getElementById("restore")

        // default users
        const defaultUsers = [
            { name: "Ahmad" },
            { name: "Ali" },
            { name: "Sara" },
            { name: "Lana" }
        ];

        //  localStorage.clear()  TO RESET VALUES


        // load users from storage or fallback
        let users = JSON.parse(localStorage.getItem("users")) || defaultUsers;

        // save users
        function saveUsers() {
            localStorage.setItem("users", JSON.stringify(users));
        }

        // render list
        function renderList(data) {
            list.innerHTML = "";

            if (data.length === 0) {
                list.innerHTML = "<p>No results found</p>";
                return;
            }

            data.forEach(user => {
                const div = document.createElement("div");
                div.className = "user";

                const logo = document.createElement("span");
                logo.innerHTML = `
    <img src="image1.jpg" style='width:50px;height:50px; border-radius:100px; margin-right:10px'> </img>
    `
                const name = document.createElement("span");
                name.textContent = user.name;

                const left = document.createElement('div');
                left.className = 'left'

                left.appendChild(logo)
                left.appendChild(name)

                const del = document.createElement("button");
                del.innerHTML = `
      <i class="fa-solid fa-x"></i>
       Delete 
    `
                del.className = "delete";

                del.addEventListener("click", () => {
                    users = users.filter(u => u.name !== user.name);
                    saveUsers();
                    applySearch(); // render with current search
                });

                div.appendChild(left)
                div.appendChild(del);
                list.appendChild(div);
            });
        }



        // apply search
        function applySearch() {
            const value = search.value;

            localStorage.setItem("search", value); // save search

            const filtered = users.filter(user =>
                user.name.includes(value)
            );

            renderList(filtered);
        }

        // search event
        search.addEventListener("input", applySearch);



        // clear button
        clearbtn.addEventListener("click", () => {
            search.value = "";
            localStorage.removeItem("search");
            renderList(users);
        });

        // load saved search
        const savedSearch = localStorage.getItem("search") || "";
        search.value = savedSearch;

        // initial render
        applySearch();
    </script>
</body>
