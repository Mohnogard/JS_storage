<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GitHub Users Viewer</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  
    body{
         font-family: open sans; 
         padding: 2rem; 
         justify-items: center;
    }

    .container{
      align-items: center;
      align-content: center;
      padding: 30px;
      width: 90%;
      text-align: center;
      height: fit-content;
      border-radius: 15px;
      box-shadow: 0px 0px 10px rgb(180, 180, 180) ;
    }

    .userss{
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 20px;
        width: 100%;
      }
    .userss .name{
      border: none;
      border-radius: 10px;
      height:200px;
      align-content: center;
      text-align: center;
      box-shadow: 0px 0px 10px rgba(180, 180, 180, 0.686) ;
    }
    .search-bar {
      border-radius: 3px;
      margin: -10px 0px 20px 0px;
      padding: 10px;
      border: solid 1px rgb(184, 184, 184);
      box-shadow: 0px 0px 4px rgba(180, 180, 180, 0.686) ;
    }
    .userss .name:hover{
      animation: mymove 2s infinite;
      transform: translateY(-10px);
      box-shadow: 1px 1px 7px 3px #ccc;
    }
    @keyframes mymove{
      from {background-color: rgb(97, 213, 97);}
      to {background-color: rgb(206, 88, 88);}
    }

    .board{
      background-color: rgba(166, 187, 254, 0.462);
      border-left: 8px solid rgb(0, 0, 165);
      padding: 30px;
      text-align: left;
      border-radius: 10px;
    }
    .board div{
      margin: 20px 5px;
    }

    .loading{
      border-radius: 5px;
      background-color:rgb(100, 100, 255);
      color: white;
      margin: 20px auto;
      width: 15%;
      padding: 15px 0px;
    }

    .divider {
      display: flex;
      align-items: center;
    }
    .divider hr {
      flex: 1;
    }

    .saver{
      display: grid;
      grid-template-columns: repeat(1,minmax(0,1fr));
    }

</style>
</head>

<body>
  <div class="container">

    <div>
      <input type="text" id="name" placeholder="Insert name"/>
  
      <input type="email" id="mail" placeholder="Insert email"/>
      <hr>
      <input type="button" id="savebtn" value="Save"/>
    </div>
<br><br>
<div id="target"> Information will load here </div>
    </div>

 <script>    
const user = document.getElementById('name');
const mail = document.getElementById('mail')
const savebtn = document.getElementById('savebtn');
const disp = document.getElementById('target');

// Load existing data on page load
const saved = localStorage.getItem("name");
const saved1 = localStorage.getItem("email");
if (saved && saved1) {
   output = JSON.parse(saved);
   output1 = JSON.parse(saved1);
   disp.innerHTML = output + "<br>" + output1
}
    savebtn.addEventListener("click", function(){
      let maildiv = mail.value
      let userdiv = user.value
      localStorage.setItem("name",JSON.stringify(userdiv));
      localStorage.setItem("email",JSON.stringify(maildiv));
      const data=localStorage.getItem("name");
      const data1=localStorage.getItem("email");

    const parsedUser=JSON.parse(data)
    const parsedUser1 = JSON.parse(data1)

    //console.log(parsedUser);
    disp.innerHTML = parsedUser+ "<br>" + parsedUser1
    })

    </script>
</body>
</html>
